<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Birthday Card for Mum</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Envelope container -->
  <div class="envelope" id="envelope">
    <div class="flap"></div>
    <span class="envelope-text">Open me</span>
    <div class="heart">❤️</div>
  </div>

  <!-- Card that appears after opening envelope -->
  <div class="card" id="card">
    <p id="card-text">Happy Birthday Mum! 🎉 Love you so much ❤️</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
