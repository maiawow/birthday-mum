<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Birthday Card for Mum</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Envelope -->
  <div class="envelope" id="envelope">
    <div class="flap"></div>
    <div class="heart" id="heart">❤️</div>
  </div>

  <!-- Card -->
  <div class="card" id="card">
    <div class="card-front" id="card-front">
      <p>Happy Birthday!! 🎂🎉💖</p>
    </div>
    <div class="card-inside" id="card-inside">
      <div class="left-panel">
        <img src="https://i.imgur.com/1.jpg" class="photo" alt="Photo 1">
        <img src="https://i.imgur.com/2.jpg" class="photo" alt="Photo 2">
        <img src="https://i.imgur.com/3.jpg" class="photo" alt="Photo 3">
      </div>
      <div class="right-panel">
        <p>Happy Birthday Mum! Wishing you a day full of love, joy, and laughter! 🎉❤️</p>
      </div>
      <div class="confetti-container" id="confetti"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
