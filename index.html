<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Birthday Card</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

</head>

<body>

<div class="envelope" id="envelope">

<div class="flap" id="flap"></div>

<div class="heart" id="heart">❤️</div>

</div>


<div class="card" id="card">

<div class="card-cover" id="cardCover">
Happy Birthday!! 🎂🎉💖
</div>

<div class="card-inside" id="cardInside">

<div class="left">

<iframe
src="https://giphy.com/embed/yqyV4Gh0werUQ"
class="gif"
frameBorder="0"
allowFullScreen>
</iframe>

</div>


<div class="right">

Happy Birthday Mum ❤️<br><br>

I hope your day is full of cake, laughter and happiness.  
Thank you for always being amazing and supportive.

</div>

</div>

</div>


<script src="script.js"></script>

</body>
</html>
