<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Birthday Card for Mum</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Envelope -->
  <div class="envelope" id="envelope">
    <div class="flap"></div>
    <span class="envelope-text">Open me</span>
    <div class="heart">❤️</div>
  </div>

  <!-- Card -->
  <div class="card" id="card">
    <div class="card-front">
      <p>Click to open the card!</p>
    </div>
    <div class="card-back">
      <p>Happy Birthday Mum! 🎉<br>Love you so much ❤️</p>
      <div class="confetti-container" id="confetti"></div>
      <div class="photos">
        <img src="https://i.imgur.com/1.jpg" class="photo" alt="Photo 1">
        <img src="https://i.imgur.com/2.jpg" class="photo" alt="Photo 2">
        <img src="https://i.imgur.com/3.jpg" class="photo" alt="Photo 3">
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
