<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday Card</title>

<link rel="stylesheet" href="style.css">

<!-- canvas-confetti library -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

</head>

<body>

<div class="envelope" id="envelope">

<div class="flap" id="flap"></div>

<div class="heart" id="heart">❤️</div>

</div>

<div class="card" id="card">

<div class="card-cover" id="cardCover">
Happy Birthday!! 🎂🎉💖
</div>

<div class="card-inside" id="cardInside">

<div class="left">

<!-- Imgur embed -->
<blockquote class="imgur-embed-pub" lang="en" data-id="B6mUks7" data-context="false">
<a href="//imgur.com/B6mUks7"></a>
</blockquote>

</div>

<div class="right">

Happy Birthday Mum ❤️<br><br>
I hope your day is full of happiness, laughter, and cake.  
Thank you for always being amazing.

</div>

</div>

</div>

<!-- Imgur script -->
<script async src="//s.imgur.com/min/embed.js" charset="utf-8"></script>

<script src="script.js"></script>

</body>
</html>
